<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banx Engineering | Make it Work. Make it Smart.</title>
    
    <!-- Spline Viewer Component -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.28/build/spline-viewer.js"></script>

    <style>
        /* Modern Industrial Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #000;
            overflow: hidden;
            cursor: none; /* Custom interaction cursor */
            width: 100%;
            height: 100%;
            color: #fff;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        /* --- THE 3D CANVAS --- */
        spline-viewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- THE INTERACTIVE SPOTLIGHT --- */
        .spotlight {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(
                circle at center,
                rgba(255, 255, 255, 0.08) 0%,
                rgba(255, 255, 255, 0.03) 25%,
                transparent 70%
            );
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            filter: blur(40px);
            opacity: 0;
            z-index: 2;
            mix-blend-mode: screen;
            transition: opacity 0.5s ease;
        }

        .spotlight.active {
            opacity: 1;
        }

        /* --- MINIMALIST BRANDING --- */
        .content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Modern bottom-weighted layout */
            align-items: flex-start;
            height: 100%;
            padding: 4rem;
            pointer-events: none; 
        }

        .brand-header {
            pointer-events: auto;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .tagline {
            font-size: 1rem;
            color: #666;
            letter-spacing: 0.05em;
        }

        /* Minimalist Cursor Dot */
        .cursor-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .cursor-dot.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Spline Robot Model -->
        <spline-viewer url="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode"></spline-viewer>

        <!-- Lighting & FX -->
        <div class="spotlight" id="spotlight"></div>
        <div class="cursor-dot" id="cursorDot"></div>
        
        <!-- Text Content -->
        <div class="content">
            <div class="brand-header">
                <h1>Banx Engineering</h1>
                <p class="tagline">Make it Work. Make it Smart.</p>
            </div>
        </div>
    </div>

    <script>
        // Remove Spline Watermark
        const cleanSpline = () => {
            const viewer = document.querySelector('spline-viewer');
            if (viewer && viewer.shadowRoot) {
                const logo = viewer.shadowRoot.querySelector('#logo');
                if (logo) logo.remove();
            }
        };
        setInterval(cleanSpline, 50);

        // Interactive Spotlight Logic
        const spotlight = document.getElementById('spotlight');
        const cursorDot = document.getElementById('cursorDot');
        const container = document.querySelector('.container');
        
        let mouseX = 0, mouseY = 0;
        let spotlightX = 0, spotlightY = 0;
        
        container.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            cursorDot.style.left = mouseX + 'px';
            cursorDot.style.top = mouseY + 'px';
        });
        
        container.addEventListener('mouseenter', () => {
            spotlight.classList.add('active');
            cursorDot.classList.add('active');
        });

        container.addEventListener('mouseleave', () => {
            spotlight.classList.remove('active');
            cursorDot.classList.remove('active');
        });
        
        // Smooth Spotlight Following
        function animate() {
            const lerp = 0.1; // Smoothness factor
            spotlightX += (mouseX - spotlightX) * lerp;
            spotlightY += (mouseY - spotlightY) * lerp;
            
            spotlight.style.left = spotlightX + 'px';
            spotlight.style.top = spotlightY + 'px';
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
